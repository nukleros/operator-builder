version: "2"
linters:
  default: none
  enable:
    - asciicheck
    - bodyclose
    - dogsled
    - dupl
    - durationcheck
    - err113
    - errcheck
    - errorlint
    - forbidigo
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    # - goconst
    - gocritic
    - gocyclo
    - godot
    - goheader
    - gomoddirectives
    - gomodguard_v2
    - goprintffuncname
    - gosec
    - govet
    - importas
    - ineffassign
    - lll
    - makezero
    - misspell
    # - mnd
    - nakedret
    - nestif
    - nilerr
    - nlreturn
    - nolintlint
    - paralleltest
    - prealloc
    - predeclared
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - wastedassign
    - whitespace
  settings:
    dupl:
      threshold: 200
    funlen:
      lines: 100
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    govet:
      settings:
        printf:
          funcs:
            - (github.com/nukleros/operator-builder/pkg/logutils.Log).Infof
            - (github.com/nukleros/operator-builder/logutils.Log).Warnf
            - (github.com/nukleros/operator-builder/pkg/logutils.Log).Errorf
            - (github.com/nukleros/operator-builder/pkg/logutils.Log).Fatalf
    lll:
      line-length: 140
    misspell:
      locale: US
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
    staticcheck:
      checks:
        - all
        - -SA1019
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - funlen
          - mnd
          - scopelint
          - testpackage
          - goconst
        path: _test\.go
      - linters:
          - gochecknoglobals
        path: internal/commands/*\.go
      - linters:
          - goconst
        path: internal/plugins/workload/v1/scaffolds
      - linters:
          - goconst
        path: internal/plugins/workload/v2/scaffolds
      - linters:
          - gocritic
        path: internal/plugins/config/v1/plugin.go
      - linters:
          - mnd
        path: internal/plugins/workload/v1/scaffolds/templates/readme.go
      - linters:
          - mnd
        path: internal/plugins/workload/v2/scaffolds/templates/readme.go
      - linters:
          - gocritic
        text: 'unnecessaryDefer:'
      - path: (.+)\.go$
        text: declaration of "(err|ctx)" shadows declaration at
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/nukleros/operator-builder
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
